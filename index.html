<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fast Food Bechar</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #0f172a url('bg.jpg') center/cover fixed;
      color: #f8fafc;
    }
    header {
      background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 50%, #7f1d1d 100%);
      color: #f8fafc;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.4);
      position: relative;
      z-index: 10;
    }
    header h1 {
      margin: 0;
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 3px;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
      background: linear-gradient(135deg, #fbbf24, #f87171);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      margin: 8px 0 0;
      font-size: 18px;
    }
    main {
      max-width: 980px;
      margin: 24px auto 40px;
      padding: 0 16px;
      position: relative;
      z-index: 20;
    }
    
    .search-container {
      margin: 20px 0;
      position: relative;
      z-index: 110;
    }
    .search-input {
      width: 100%;
      padding: 16px 20px;
      font-size: 16px;
      border: 2px solid rgba(251, 191, 36, 0.4);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.95);
      color: #fff;
      box-sizing: border-box;
      transition: all 0.3s ease;
      text-align: right;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }
    .search-input:focus {
      outline: none;
      border-color: #fbbf24;
      box-shadow: 0 8px 30px rgba(251, 191, 36, 0.3);
      background: rgba(30, 41, 59, 0.98);
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid rgba(248, 250, 252, 0.1);
      position: relative;
      z-index: 100;
    }
    .tab-button {
      flex: 1;
      padding: 14px 24px;
      background: rgba(15, 23, 42, 0.85);
      border: 2px solid rgba(255, 255, 255, 0.1);
      color: #cbd5e1;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 12px 12px 0 0;
      transition: all 0.2s;
      text-align: center;
    }
    .tab-button.active {
      background: linear-gradient(135deg, #1e40af, #7f1d1d);
      color: #fbbf24;
      border-color: #fbbf24;
      box-shadow: 0 -8px 16px rgba(0, 0, 0, 0.3);
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    form {
      background: rgba(15, 23, 42, 0.95);
      padding: 24px;
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.5);
      margin-bottom: 24px;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
      color: #e2e8f0;
      text-align: right;
    }
    input, textarea, select {
      width: 100%;
      padding: 14px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      box-sizing: border-box;
      transition: all 0.2s;
      text-align: right;
    }
    button {
      background: linear-gradient(135deg, #7f1d1d, #991b1b);
      color: white;
      border: none;
      padding: 14px 22px;
      font-size: 16px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 18px;
      width: 100%;
      font-weight: 600;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: rgba(30, 41, 59, 0.95);
      border-radius: 24px;
      box-shadow: 0 20px 55px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      padding: 24px;
      border: 1px solid rgba(248, 250, 252, 0.1);
      text-align: right;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 24px;
      color: #fbbf24;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 8px 0;
    }
    ul li {
      padding: 4px 0;
      color: #cbd5e1;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    /* أزرار الاتصال والموقع الحديثة */
    .action-btn-container {
      display: flex;
      gap: 10px;
      margin: 15px 0;
    }
    .btn-inline {
      flex: 1;
      padding: 12px 14px;
      font-size: 14px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-copy {
      background: linear-gradient(135deg, #1e40af, #2563eb);
    }
    .btn-copy:hover {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
    }
    .btn-gps {
      background: linear-gradient(135deg, #d97706, #f59e0b);
    }
    .btn-gps:hover {
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #cbd5e1;
      font-size: 18px;
      width: 100%;
    }
    .delete-btn {
      background: linear-gradient(135deg, #dc2626, #991b1b);
      color: white;
      border: none;
      padding: 10px 18px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
      font-weight: bold;
    }
    .whatsapp-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 60px;
      height: 60px;
      background: #25d366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4);
      z-index: 1000;
    }
    .whatsapp-btn svg {
      width: 35px;
      height: 35px;
      fill: white;
    }
  </style>
</head>
<body>

  <a href="https://wa.me/213652394088?text=مرحبا%20بفاست%20فود%20بشار" class="whatsapp-btn" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761"/></svg>
  </a>

  <header>
    <h1>FAST FOOD</h1>
    <p>Bechar - بشار</p>
  </header>

  <main>
    <div class="search-container" id="searchBox">
      <input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث عن مطعم أو أكلة (برغر، تاكوس، بيتزا...)..." />
    </div>

    <div class="tabs">
      <button class="tab-button active" data-tab="browse">عرض المطاعم</button>
      <button class="tab-button" data-tab="add">إضافة مطعم</button>
    </div>

    <div id="browse" class="tab-content active">
      <section>
        <h2 style="text-align: right; margin-bottom: 20px;">قائمة المطاعم</h2>
        <div class="cards" id="placesList">
          <div class="loading">جاري تحميل المطاعم...</div>
        </div>
      </section>
    </div>

    <div id="add" class="tab-content">
      <form id="placeForm">
        <label for="name">اسم المطعم</label>
        <input type="text" id="name" required placeholder="مثال: فاست فود بشار" />

        <label for="rating">التقييم</label>
        <select id="rating" required>
          <option value="5">5 نجوم</option>
          <option value="4">4 نجوم</option>
          <option value="3">3 نجوم</option>
        </select>

        <label for="menu">قائمة الطعام والأسعار</label>
        <textarea id="menu" rows="4" placeholder="تاكوس - 500 دج"></textarea>

        <label for="image">صورة المطعم</label>
        <input type="file" id="image" accept="image/*" />

        <label for="phone">رقم الهاتف</label>
        <input type="tel" id="phone" placeholder="0555123456" />

        <label for="gps">موقع GPS</label>
        <input type="text" id="gps" placeholder="رابط الخريطة أو الإحداثيات" />

        <button type="submit">إضافة المطعم</button>
      </form>
      <div id="message" style="display:none;" class="loading"></div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBqKHMC6jltH56-vfcsTqZHh0KOVZaWuZY",
      authDomain: "fast-food-bechar.firebaseapp.com",
      projectId: "fast-food-bechar",
      storageBucket: "fast-food-bechar.firebasestorage.app",
      messagingSenderId: "246283971912",
      appId: "1:246283971912:web:72f82ef7d6839ef89b177d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const checkAuth = (input) => input === "8584786839";

    // التبديل بين التبويبات
    document.querySelectorAll('.tab-button').forEach(button => {
      button.addEventListener('click', (e) => {
        const tabId = button.dataset.tab;
        if (tabId === "add") {
          const password = prompt("كلمة المرور لصفحة الإضافة:");
          if (!checkAuth(password)) { alert("خطأ!"); return; }
          document.getElementById('searchBox').style.display = 'none';
        } else {
          document.getElementById('searchBox').style.display = 'block';
        }
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        button.classList.add('active');
        document.getElementById(tabId).classList.add('active');
      });
    });

    window.copyToClipboard = function(text) {
      navigator.clipboard.writeText(text).then(() => alert('تم نسخ الرقم: ' + text)).catch(() => alert('الرقم: ' + text));
    };

    const placesList = document.getElementById('placesList');

    function formatMenu(menu) {
      if (!menu || menu.trim() === "" || menu.includes("لا توجد")) return '<li>لا توجد قائمة حالياً</li>';
      return menu.split('\n').filter(line => line.trim()).map(line => `<li>${line}</li>`).join('');
    }

    // الدالة الذكية والمحصنة ضد أخطاء تسمية الحقول القديمة والجديدة
    async function loadPlaces() {
      try {
        let querySnapshot = await getDocs(collection(db, "restaurants"));
        if (querySnapshot.empty) {
          placesList.innerHTML = '<p style="text-align:center; width:100%;">لا توجد مطاعم.</p>';
          return;
        }

        let htmlContent = '';
        querySnapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const docId = docSnap.id;
          
          // حماية وقراءة ذكية مهما كان اسم الحقل في قاعدة البيانات
          const name = data.restaurantName || data.name || "مطعم";
          const rating = data.rating || "5";
          const menu = data.menuPrices || data.menu || "";
          
          // جلب رقم الهاتف بأي طريقة كُتب بها سابقاً
          let phone = data.phoneNumber || data.phone || data["phone number"] || data["PhoneNumber"] || "";
          phone = typeof phone === 'string' ? phone.trim() : String(phone);

          // جلب الـ GPS بأي طريقة كُتب بها سابقاً
          let gps = data.gpsLocation || data.gps || data["gps"] || data["GpsLocation"] || "";
          gps = typeof gps === 'string' ? gps.trim() : String(gps);

          let gpsLink = "#";
          if (gps.startsWith("http")) {
            gpsLink = gps;
          } else if (gps !== "" && gps !== "---") {
            gpsLink = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(gps);
          }

          htmlContent += `
            <article class="card restaurant-card" data-name="${name.toLowerCase()}" data-menu="${menu.toLowerCase()}">
              ${data.image ? `<img src="${data.image}" style="width:100%; border-radius:15px; margin-bottom:15px; max-height:220px; object-fit:cover;" />` : ''}
              <h2>${name}</h2>
              <p>⭐ التقييم: ${rating} / 5</p>
              <p><strong>قائمة الطعام:</strong></p>
              <ul>${formatMenu(menu)}</ul>
              
              <div class="action-btn-container">
                ${phone && phone !== "---" && phone !== "undefined" ? `
                  <button type="button" class="btn-inline btn-copy" onclick="window.copyToClipboard('${phone}')">
                    نسخ الرقم 📋
                  </button>
                ` : ''}
                
                ${gpsLink !== "#" && gps !== "undefined" ? `
                  <a href="${gpsLink}" target="_blank" class="btn-inline btn-gps">
                    زيارة الموقع 📍
                  </a>
                ` : ''}
              </div>

              <button class="delete-btn" data-id="${docId}">حذف المطعم 🗑️</button>
            </article>
          `;
        });
        
        placesList.innerHTML = htmlContent;
        initSearch();

        // تفعيل أزرار الحذف
        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.target.dataset.id;
            const password = prompt("كلمة المرور للحذف:");
            if (checkAuth(password)) {
              await deleteDoc(doc(db, "restaurants", id));
              alert("تم الحذف!");
              loadPlaces();
            } else {
              alert("خطأ!");
            }
          });
        });

      } catch (error) {
        placesList.innerHTML = '<p style="text-align:center; width:100%;">حدث خطأ في جلب البيانات.</p>';
      }
    }

    function initSearch() {
      document.getElementById('searchInput').addEventListener('input', (e) => {
        const keyword = e.target.value.toLowerCase().trim();
        document.querySelectorAll('.restaurant-card').forEach(card => {
          const name = card.dataset.name || '';
          const menu = card.dataset.menu || '';
          card.style.display = (name.includes(keyword) || menu.includes(keyword)) ? 'block' : 'none';
        });
      });
    }

    loadPlaces();

    // رفع وإرسال البيانات الجديدة مع الحقول القياسية
    document.getElementById('placeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgDiv = document.getElementById('message');
      msgDiv.style.display = 'block';
      msgDiv.textContent = 'جاري الحفظ...';

      try {
        let imageData = '';
        const file = document.getElementById('image').files[0];
        if (file) {
          imageData = await new Promise((res) => {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = (ev) => res(ev.target.result);
          });
        }

        await addDoc(collection(db, "restaurants"), {
          restaurantName: document.getElementById('name').value,
          rating: document.getElementById('rating').value,
          menuPrices: document.getElementById('menu').value,
          phoneNumber: document.getElementById('phone').value,
          gpsLocation: document.getElementById('gps').value,
          image: imageData,
          createdAt: new Date()
        });

        alert('تمت الإضافة بنجاح! 🎉');
        location.reload();
      } catch (err) {
        alert('خطأ: ' + err.message);
      }
    });
  </script>
</body>
</html>
