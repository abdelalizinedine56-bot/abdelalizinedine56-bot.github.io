<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fast Food Bechar</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #0f172a url('bg.jpg') center/cover fixed;
      color: #f8fafc;
    }
    header {
      background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 50%, #7f1d1d 100%);
      color: #f8fafc;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.4);
      position: relative;
      z-index: 10;
    }
    header h1 {
      margin: 0;
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 3px;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
      background: linear-gradient(135deg, #fbbf24, #f87171);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      margin: 8px 0 0;
      font-size: 18px;
    }
    main {
      max-width: 980px;
      margin: 24px auto 40px;
      padding: 0 16px;
      position: relative;
      z-index: 20;
    }
    
    .search-container {
      margin: 20px 0;
      position: relative;
      z-index: 110;
    }
    .search-input {
      width: 100%;
      padding: 16px 20px;
      font-size: 16px;
      border: 2px solid rgba(251, 191, 36, 0.4);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.95);
      color: #fff;
      box-sizing: border-box;
      transition: all 0.3s ease;
      text-align: right;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }
    .search-input:focus {
      outline: none;
      border-color: #fbbf24;
      box-shadow: 0 8px 30px rgba(251, 191, 36, 0.3);
      background: rgba(30, 41, 59, 0.98);
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid rgba(248, 250, 252, 0.1);
      position: relative;
      z-index: 100;
    }
    .tab-button {
      flex: 1;
      padding: 14px 24px;
      background: rgba(15, 23, 42, 0.85);
      border: 2px solid rgba(255, 255, 255, 0.1);
      color: #cbd5e1;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 12px 12px 0 0;
      transition: all 0.2s;
      text-align: center;
    }
    .tab-button.active {
      background: linear-gradient(135deg, #1e40af, #7f1d1d);
      color: #fbbf24;
      border-color: #fbbf24;
      box-shadow: 0 -8px 16px rgba(0, 0, 0, 0.3);
    }
    .tab-button:hover {
      color: #fbbf24;
      background: rgba(30, 64, 175, 0.9);
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    form {
      background: rgba(15, 23, 42, 0.95);
      padding: 24px;
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.5);
      margin-bottom: 24px;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
      color: #e2e8f0;
      text-align: right;
    }
    input, textarea, select {
      width: 100%;
      padding: 14px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      box-sizing: border-box;
      transition: all 0.2s;
      text-align: right;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #fbbf24;
      background: rgba(255, 255, 255, 0.1);
    }
    button {
      background: linear-gradient(135deg, #7f1d1d, #991b1b);
      color: white;
      border: none;
      padding: 14px 22px;
      font-size: 16px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 18px;
      transition: transform 0.16s ease, background 0.16s ease;
      font-weight: 600;
      width: 100%;
    }
    button:hover {
      background: linear-gradient(135deg, #991b1b, #b91c1c);
      transform: translateY(-2px);
    }
    .message {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.4);
      text-align: center;
    }
    .error-message {
      background: rgba(220, 38, 38, 0.2) !important;
      color: #fca5a5 !important;
      border-color: rgba(220, 38, 38, 0.4) !important;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: rgba(30, 41, 59, 0.95);
      border-radius: 24px;
      box-shadow: 0 20px 55px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      padding: 24px;
      border: 1px solid rgba(248, 250, 252, 0.1);
      text-align: right;
      position: relative;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 24px;
      color: #fbbf24;
    }
    .card p {
      margin: 10px 0;
      line-height: 1.7;
      color: #cbd5e1;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 8px 0;
    }
    ul li {
      padding: 4px 0;
      color: #cbd5e1;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    /* تنسيق أزرار الإجراءات الجديدة */
    .action-btn-container {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      margin-bottom: 5px;
    }
    .btn-inline {
      flex: 1;
      margin-top: 0;
      padding: 12px 14px;
      font-size: 14px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }
    .btn-copy {
      background: linear-gradient(135deg, #1e40af, #2563eb);
    }
    .btn-copy:hover {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
    }
    .btn-gps {
      background: linear-gradient(135deg, #d97706, #f59e0b);
    }
    .btn-gps:hover {
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #cbd5e1;
      font-size: 18px;
      width: 100%;
    }
    .delete-btn {
      background: linear-gradient(135deg, #dc2626, #991b1b);
      color: white;
      border: none;
      padding: 10px 18px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
      width: 100%;
      transition: background 0.2s;
      font-weight: bold;
    }
    .delete-btn:hover {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
    }
    .whatsapp-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 60px;
      height: 60px;
      background: #25d366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4);
      transition: transform 0.3s, box-shadow 0.3s;
      z-index: 1000;
      text-decoration: none;
    }
    .whatsapp-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.6);
    }
    .whatsapp-btn svg {
      width: 35px;
      height: 35px;
      fill: white;
    }
  </style>
</head>
<body>

  <a href="https://wa.me/213652394088?text=مرحبا%20بفاست%20فود%20بشار" class="whatsapp-btn" title="تواصل معنا عبر واتساب">
    <svg viewBox="0 0 24 24">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761"/>
    </svg>
  </a>

  <header>
    <h1>FAST FOOD</h1>
    <p>Bechar - بشار</p>
  </header>

  <main>
    <div class="search-container" id="searchBox">
      <input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث عن مطعم أو أكلة (برغر، تاكوس، بيتزا...)..." />
    </div>

    <div class="tabs">
      <button class="tab-button active" data-tab="browse">عرض المطاعم</button>
      <button class="tab-button" data-tab="add">إضافة مطعم</button>
    </div>

    <div id="browse" class="tab-content active">
      <section>
        <h2 style="text-align: right; margin-bottom: 20px;">قائمة المطاعم</h2>
        <div class="cards" id="placesList">
          <div class="loading">جاري تحميل المطاعم...</div>
        </div>
      </section>
    </div>

    <div id="add" class="tab-content">
      <form id="placeForm">
        <label for="name">اسم المطعم</label>
        <input type="text" id="name" required placeholder="مثال: فاست فود بشار" />

        <label for="rating">التقييم</label>
        <select id="rating" required>
          <option value="">اختر التقييم</option>
          <option value="5">5 نجوم</option>
          <option value="4">4 نجوم</option>
          <option value="3">3 نجوم</option>
          <option value="2">2 نجوم</option>
          <option value="1">1 نجمة</option>
        </select>

        <label for="menu">قائمة الطعام والأسعار</label>
        <textarea id="menu" rows="4" placeholder="مثال:
تاكوس - 200 دج
برغر - 1200 دج"></textarea>

        <label for="image">صورة المطعم (سيتم ضغطها تلقائياً)</label>
        <input type="file" id="image" accept="image/*" />

        <label for="phone">رقم الهاتف</label>
        <input type="tel" id="phone" placeholder="مثال: 0555 123 456" />

        <label for="gps">موقع GPS (إحداثيات أو رابط الخريطة)</label>
        <input type="text" id="gps" placeholder="مثال: 31.6234, -2.2144 أو رابط الموقع" />

        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin-top: 15px;">
          <input type="checkbox" id="ownerConfirm" required style="width: auto;" /> أنا صاحب هذا المطعم أو ممثل عنه
        </label>

        <button type="submit">إضافة المطعم</button>
      </form>

      <div id="message" class="message" style="display:none;"></div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBqKHMC6jltH56-vfcsTqZHh0KOVZaWuZY",
      authDomain: "fast-food-bechar.firebaseapp.com",
      projectId: "fast-food-bechar",
      storageBucket: "fast-food-bechar.firebasestorage.app",
      messagingSenderId: "246283971912",
      appId: "1:246283971912:web:72f82ef7d6839ef89b177d",
      measurementId: "G-03Y3TC5YLN"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const _p1 = "85847";
    const _p2 = "86839";
    const checkAuth = (input) => input === (_p1 + _p2);

    document.querySelectorAll('.tab-button').forEach(button => {
      button.addEventListener('click', (e) => {
        e.preventDefault();
        const tabId = button.dataset.tab;
        
        if (tabId === "add") {
          const password = prompt("يرجى إدخال كلمة المرور لفتح صفحة إضافة مطعم:");
          if (password === null) return; 
          
          if (!checkAuth(password)) {
            alert("كلمة المرور خاطئة! لا تملك صلاحية الدخول لصفحة الإضافة.");
            return; 
          }
          document.getElementById('searchBox').style.display = 'none';
        } else {
          document.getElementById('searchBox').style.display = 'block';
        }

        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        button.classList.add('active');
        document.getElementById(tabId).classList.add('active');
      });
    });

    // دالة نسخ مضمونة
    window.copyToClipboard = function(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('تم نسخ رقم الهاتف بنجاح: ' + text);
      }).catch(err => {
        alert('الرقم المنسوخ: ' + text);
      });
    };

    const form = document.getElementById('placeForm');
    const message = document.getElementById('message');
    const placesList = document.getElementById('placesList');
    const searchInput = document.getElementById('searchInput');

    function formatMenu(menu) {
      if (!menu || menu.trim() === "") return '<li>لا توجد قائمة حالياً</li>';
      return menu.split('\n').filter(line => line.trim()).map(line => `<li>${line}</li>`).join('');
    }

    async function loadPlaces() {
      try {
        let querySnapshot;
        try {
          const q = query(collection(db, "restaurants"), orderBy("createdAt", "desc"));
          querySnapshot = await getDocs(q);
        } catch (idxError) {
          querySnapshot = await getDocs(collection(db, "restaurants"));
        }
        
        if (querySnapshot.empty) {
          placesList.innerHTML = '<p style="text-align:center; width:100%;">لا توجد مطاعم مسجلة حالياً.</p>';
          return;
        }

        let htmlContent = '';
        querySnapshot.forEach((documentSnapshot) => {
          const place = documentSnapshot.data();
          const docId = documentSnapshot.id;
          
          const resName = place.restaurantName || place.name || "مطعم غير مسمى";
          let resPhone = place.phoneNumber || place.phone || place["phone number"] || "";
          let resGps = place.gpsLocation || place.gps || "";
          const resMenu = place.menuPrices || place.menu || "";

          resPhone = resPhone.trim();
          resGps = resGps.trim();

          // معالجة رابط الـ GPS بذكاء
          let gpsLink = "#";
          if (resGps.startsWith("http")) {
            gpsLink = resGps;
          } else if (resGps !== "" && resGps !== "---") {
            gpsLink = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(resGps);
          }

          htmlContent += `
            <article class="card restaurant-card" data-name="${resName.toLowerCase()}" data-menu="${resMenu.toLowerCase()}">
              ${place.image ? `<img src="${place.image}" style="width:100%; border-radius:15px; margin-bottom:15px; max-height:220px; object-fit:cover;" />` : ''}
              <h2>${resName}</h2>
              <p>⭐ التقييم: ${place.rating || '5'} / 5</p>
              <p><strong>قائمة الطعام:</strong></p>
              <ul>${formatMenu(resMenu)}</ul>
              
              <div class="action-btn-container">
                ${resPhone && resPhone !== "---" && resPhone !== "" ? `
                  <button type="button" class="btn-inline btn-copy" onclick="window.copyToClipboard('${resPhone}')">
                    نسخ الرقم 📋
                  </button>
                ` : ''}
                
                ${gpsLink !== "#" ? `
                  <a href="${gpsLink}" target="_blank" class="btn-inline btn-gps">
                    زيارة الموقع 📍
                  </a>
                ` : ''}
              </div>

              <button class="delete-btn" data-id="${docId}">حذف المطعم 🗑️</button>
            </article>
          `;
        });
        
        placesList.innerHTML = htmlContent;
        initSearch();

        // الحذف
        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const idToDel = e.target.dataset.id;
            const password = prompt("يرجى إدخال كلمة المرور لحذف هذا المطعم:");
            if (password === null) return;
            if (checkAuth(password)) {
              if (confirm("هل أنت متأكد تماماً من رغبتك في حذف هذا المطعم؟")) {
                try {
                  await deleteDoc(doc(db, "restaurants", idToDel));
                  alert("تم حذف المطعم بنجاح! 🗑️");
                  loadPlaces();
                } catch (err) {
                  alert("حدث خطأ أثناء الحذف: " + err.message);
                }
              }
            } else {
              alert("كلمة المرور غير صحيحة!");
            }
          });
        });

      } catch (error) {
        console.error(error);
        placesList.innerHTML = '<p style="text-align:center; width:100%; color:#fca5a5;">حدث خطأ أثناء الاتصال بقاعدة البيانات.</p>';
      }
    }

    function initSearch() {
      searchInput.addEventListener('input', (e) => {
        const keyword = e.target.value.toLowerCase().trim();
        const cards = document.querySelectorAll('.restaurant-card');
        cards.forEach(card => {
          const name = card.dataset.name || '';
          const menu = card.dataset.menu || '';
          if (name.includes(keyword) || menu.includes(keyword)) {
            card.style.display = 'block';
          } else {
            card.style.display = 'none';
          }
        });
      });
    }

    loadPlaces();

    function compressImage(file, maxWidth = 800, maxHeight = 600, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            if (width > height) {
              if (width > maxWidth) {
                height = Math.round((height * maxWidth) / width);
                width = maxWidth;
              }
            } else {
              if (height > maxHeight) {
                width = Math.round((width * maxHeight) / height);
                height = maxHeight;
              }
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
        };
        reader.onerror = (err) => reject(err);
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const file = document.getElementById('image').files[0];
        let imageData = '';
        if (file) {
          message.style.display = 'block';
          message.className = 'message';
          message.textContent = 'جاري معالجة الصورة...';
          imageData = await compressImage(file, 800, 600, 0.7);
        }
        message.style.display = 'block';
        message.className = 'message';
        message.textContent = 'جاري رفع البيانات...';

        await addDoc(collection(db, "restaurants"), {
          restaurantName: document.getElementById('name').value,
          rating: document.getElementById('rating').value,
          menuPrices: document.getElementById('menu').value,
          phoneNumber: document.getElementById('phone').value,
          gpsLocation: document.getElementById('gps').value,
          image: imageData,
          createdAt: new Date()
        });
        
        message.className = 'message';
        message.textContent = 'تمت إضافة المطعم بنجاح! 🎉';
        form.reset();

        setTimeout(() => {
          loadPlaces();
          document.getElementById('searchBox').style.display = 'block';
          document.querySelector('[data-tab="browse"]').click();
          message.style.display = 'none';
          searchInput.value = ''; 
        }, 2000);
      } catch (error) {
        message.className = 'message error-message';
        message.style.display = 'block';
        message.textContent = 'حدث خطأ: ' + error.message;
      }
    });
  </script>
</body>
</html>
