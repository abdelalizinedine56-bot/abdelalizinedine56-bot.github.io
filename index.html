<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fast Food Bechar</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #0f172a url('bg.jpg') center/cover fixed;
      color: #f8fafc;
    }
    header {
      background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 50%, #7f1d1d 100%);
      color: #f8fafc;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.4);
    }
    header h1 {
      margin: 0;
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 3px;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
      background: linear-gradient(135deg, #fbbf24, #f87171);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      margin: 8px 0 0;
      font-size: 18px;
    }
    main {
      max-width: 980px;
      margin: 24px auto 40px;
      padding: 0 16px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid rgba(248, 250, 252, 0.1);
    }
    .tab-button {
      padding: 14px 24px;
      background: rgba(15, 23, 42, 0.7);
      border: none;
      color: #cbd5e1;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 12px 12px 0 0;
      transition: all 0.2s;
    }
    .tab-button.active {
      background: linear-gradient(135deg, #1e40af, #7f1d1d);
      color: #fbbf24;
      box-shadow: 0 -8px 16px rgba(0, 0, 0, 0.3);
    }
    .tab-button:hover {
      color: #fbbf24;
      background: rgba(30, 64, 175, 0.8);
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    form {
      background: rgba(15, 23, 42, 0.95);
      padding: 24px;
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.5);
      margin-bottom: 24px;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
      color: #e2e8f0;
      text-align: right;
    }
    input, textarea, select {
      width: 100%;
      padding: 14px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      box-sizing: border-box;
      transition: all 0.2s;
      text-align: right;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #fbbf24;
      background: rgba(255, 255, 255, 0.1);
    }
    button {
      background: linear-gradient(135deg, #7f1d1d, #991b1b);
      color: white;
      border: none;
      padding: 14px 22px;
      font-size: 16px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 18px;
      transition: transform 0.16s ease, background 0.16s ease;
      font-weight: 600;
      width: 100%;
    }
    button:hover {
      background: linear-gradient(135deg, #991b1b, #b91c1c);
      transform: translateY(-2px);
    }
    .message {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.4);
      text-align: center;
    }
    .error-message {
      background: rgba(220, 38, 38, 0.2) !important;
      color: #fca5a5 !important;
      border-color: rgba(220, 38, 38, 0.4) !important;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: rgba(30, 41, 59, 0.9);
      border-radius: 24px;
      box-shadow: 0 20px 55px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      padding: 24px;
      border: 1px solid rgba(248, 250, 252, 0.1);
      text-align: right;
      position: relative;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 24px;
      color: #fbbf24;
    }
    .card p {
      margin: 8px 0;
      line-height: 1.7;
      color: #cbd5e1;
    }
    .small {
      color: #94a3b8;
      font-size: 14px;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 8px 0;
    }
    ul li {
      padding: 4px 0;
      color: #cbd5e1;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .delete-btn {
      background: #dc2626;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 10px;
      width: 100%;
      transition: background 0.2s;
    }
    .delete-btn:hover {
      background: #991b1b;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #cbd5e1;
      font-size: 18px;
    }
    .whatsapp-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 60px;
      height: 60px;
      background: #25d366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4);
      transition: transform 0.3s, box-shadow 0.3s;
      z-index: 1000;
      text-decoration: none;
    }
    .whatsapp-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.6);
    }
    .whatsapp-btn svg {
      width: 35px;
      height: 35px;
      fill: white;
    }
  </style>
</head>
<body>
  <!-- زر الواتساب -->
  <a href="https://wa.me/213652394088?text=مرحبا%20بفاست%20فود%20بشار" class="whatsapp-btn" title="تواصل معنا عبر واتساب">
    <svg viewBox="0 0 24 24">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.67-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.076 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421-7.403h-.004c-1.022 0-2.031.193-3.008.568C9.06 7.15 8.12 7.607 7.31 8.237l-.003.002c-.91.706-1.688 1.58-2.286 2.599-1.288 2.196-1.117 4.88.48 6.858 1.597 1.978 4.065 2.66 6.29 1.943 2.226-.717 3.93-2.598 4.278-4.84.348-2.242-.958-4.424-3.123-5.12-.715-.236-1.478-.348-2.265-.347"/>
    </svg>
  </a>

  <header>
    <h1>FAST FOOD</h1>
    <p>Bechar - بشار</p>
  </header>

  <main>
    <div class="tabs">
      <button class="tab-button active" data-tab="browse">عرض المطاعم</button>
      <button class="tab-button" data-tab="add">إضافة مطعم</button>
    </div>

    <div id="browse" class="tab-content active">
      <section>
        <h2 style="text-align: right;">قائمة المطاعم</h2>
        <div class="cards" id="placesList"><div class="loading">جاري تحميل المطاعم...</div></div>
      </section>
    </div>

    <div id="add" class="tab-content">
      <form id="placeForm">
        <label for="name">اسم المطعم</label>
        <input type="text" id="name" required placeholder="مثال: فاست فود بشار" />

        <label for="rating">التقييم</label>
        <select id="rating" required>
          <option value="">اختر التقييم</option>
          <option value="5">5 نجوم</option>
          <option value="4">4 نجوم</option>
          <option value="3">3 نجوم</option>
          <option value="2">2 نجوم</option>
          <option value="1">1 نجمة</option>
        </select>

        <label for="menu">قائمة الطعام والأسعار</label>
        <textarea id="menu" rows="4" placeholder="مثال:&#10;تاكوس - 200 دج&#10;برغر - 1200 دج"></textarea>

        <label for="image">صورة المطعم</label>
        <input type="file" id="image" accept="image/*" />

        <label for="phone">رقم الهاتف</label>
        <input type="tel" id="phone" placeholder="مثال: 0555 123 456" />

        <label for="gps">موقع GPS</label>
        <input type="text" id="gps" placeholder="مثال: 33.6678, 2.9423" />

        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
          <input type="checkbox" id="ownerConfirm" required style="width: auto;" /> أنا صاحب هذا المطعم أو ممثل عنه
        </label>

        <button type="submit">إضافة المطعم</button>
      </form>

      <div id="message" class="message" style="display:none;"></div>
    </div>
  </main>

  <script>
    const API_URL = 'https://api.jsonbin.io/v3/b';
    const BIN_ID = '6753a8d0ad19ca34f8d3c5e2';
    const API_KEY = '$2b$10$...'; // سنستخدم طريقة بديلة

    // التبديل بين التبويبات
    document.querySelectorAll('.tab-button').forEach(button => {
      button.addEventListener('click', () => {
        const tabId = button.dataset.tab;
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        button.classList.add('active');
        document.getElementById(tabId).classList.add('active');
      });
    });

    const form = document.getElementById('placeForm');
    const message = document.getElementById('message');
    const placesList = document.getElementById('placesList');
    
    let allPlaces = [];

    function formatMenu(menu) {
      if (!menu) return '<li>لا توجد قائمة</li>';
      return menu.split('\n').filter(line => line.trim()).map(line => `<li>${line}</li>`).join('');
    }

    function renderPlaces() {
      if (!allPlaces || allPlaces.length === 0) {
        placesList.innerHTML = '<p style="text-align:center; width:100%;">لا توجد مطاعم مسجلة حالياً.</p>';
        return;
      }

      placesList.innerHTML = allPlaces.map((place, index) => `
        <article class="card">
          ${place.image ? `<img src="${place.image}" style="width:100%; border-radius:15px; margin-bottom:15px; max-height:300px; object-fit:cover;" />` : ''}
          <h2>${place.name}</h2>
          <p>⭐ التقييم: ${place.rating} / 5</p>
          <p><strong>قائمة الطعام:</strong></p>
          <ul>${formatMenu(place.menu)}</ul>
          <p><strong>📞 الهاتف:</strong> ${place.phone || '---'}</p>
          <p><strong>📍 GPS:</strong> ${place.gps || '---'}</p>
          <button class="delete-btn" onclick="deletePlace(${index})">حذف المطعم</button>
        </article>
      `).join('');
    }

    // تحميل البيانات من LocalStorage (للنسخة المحلية السريعة)
    function loadPlaces() {
      const stored = localStorage.getItem('fastFoodBecharPlaces');
      if (stored) {
        try {
          allPlaces = JSON.parse(stored);
        } catch (e) {
          allPlaces = [];
        }
      }
      renderPlaces();
    }

    function savePlaces() {
      localStorage.setItem('fastFoodBecharPlaces', JSON.stringify(allPlaces));
      renderPlaces();
    }

    window.deletePlace = function(index) {
      if (confirm('هل تريد حذف هذا المطعم؟')) {
        allPlaces.splice(index, 1);
        savePlaces();
        message.classList.remove('error-message');
        message.style.display = 'block';
        message.textContent = 'تم حذف المطعم بنجاح!';
        setTimeout(() => {
          message.style.display = 'none';
        }, 2000);
      }
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      try {
        const file = document.getElementById('image').files[0];
        let imageData = '';
        
        if (file) {
          if (file.size > 1000000) {
            message.classList.add('error-message');
            message.style.display = 'block';
            message.textContent = 'خطأ: حجم الصورة كبير جداً (أقصى حد 1MB)';
            return;
          }
          imageData = await new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(file);
          });
        }

        const newPlace = {
          name: document.getElementById('name').value,
          rating: document.getElementById('rating').value,
          menu: document.getElementById('menu').value,
          phone: document.getElementById('phone').value,
          gps: document.getElementById('gps').value,
          image: imageData,
          timestamp: new Date().getTime()
        };

        allPlaces.unshift(newPlace);
        savePlaces();
        
        message.classList.remove('error-message');
        message.style.display = 'block';
        message.textContent = 'تمت إضافة المطعم بنجاح!';
        form.reset();

        setTimeout(() => {
          document.querySelector('[data-tab="browse"]').click();
          message.style.display = 'none';
        }, 2000);
      } catch (error) {
        message.classList.add('error-message');
        message.style.display = 'block';
        message.textContent = 'خطأ: ' + error.message;
      }
    });

    loadPlaces();
  </script>
</body>
</html>
